    <header class="site-header">
      <a href="index.html" class="logo"><img class="logo-img" src="images/ksu%20logo%20white.png" alt="KSU Logo" /><span>College Hostel Finder</span></a>

    <main class="content">

      <!-- Review & Rating Section -->
      <div class="review-flex-row" id="reviews-box" hidden>

          <p class="avg-rating">
            <span id="avg-stars"></span>
            <span id="avg-score"></span> · <span id="review-count"></span>
          </p>
          <form id="review-form">
            <div class="star-input" id="star-input">
              <i class="fa-regular fa-star" data-val="1"></i>
              <i class="fa-regular fa-star" data-val="2"></i>
              <i class="fa-regular fa-star" data-val="3"></i>
              <i class="fa-regular fa-star" data-val="4"></i>
              <i class="fa-regular fa-star" data-val="5"></i>
            </div>
            <textarea id="review-text" rows="3" placeholder="Share your experience…" required></textarea>
            <button type="submit">Submit</button>
          </form>
        </section>
        <section class="neu-box review-section review-list-box">
          <h3>All Reviews</h3>
          <ul id="reviews-list-box" class="reviews-list"></ul>
        </section>
      </div>
    </main>
